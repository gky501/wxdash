<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEMS Weather Center</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
:root{
  --green:#1f7a3a;
  --yellow:#facc15;
  --orange:#f97316;
  --red:#dc2626;
  --purple:#7e22ce;
  --dark:#080808;
  --panel:#111;
  --blue:#005bea;
}

body{
  margin:0;
  background:var(--dark);
  color:white;
  font-family:Arial, Helvetica, sans-serif;
}

header{
  background:#000;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.header-title{
  font-size:26px;
  font-weight:900;
  letter-spacing:2px;
}

.header-info{
  text-align:right;
  font-size:13px;
  line-height:1.35;
  color:#e5e7eb;
}

.top-bar{
  display:flex;
}

.zone{
  flex:1;
  text-align:center;
  padding:10px 6px;
  font-weight:900;
  font-size:13px;
  color:white;
  border-right:1px solid rgba(255,255,255,.25);
}

.zone.normal{background:var(--green);}
.zone.tstorm-watch{background:var(--yellow); color:#111;}
.zone.tstorm-warning{background:var(--orange);}
.zone.tornado-watch{background:var(--red);}
.zone.tornado-warning{background:var(--purple);}
.zone.tornado-emergency{
  background:linear-gradient(90deg,var(--red),var(--purple));
  animation:pulseEmergency 1s infinite;
}

.layout{
  display:grid;
  grid-template-columns:70% 30%;
  height:calc(100vh - 114px);
}

#map{
  height:100%;
  background:#111;
}

.panel{
  background:var(--panel);
  padding:14px;
  overflow-y:auto;
}

.alert-box{
  padding:13px;
  margin-bottom:12px;
  border-radius:8px;
  cursor:pointer;
  border-left:5px solid white;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
}

.alert-box.normal{background:var(--green);}
.alert-box.tstorm-watch{background:#a16207; color:white;}
.alert-box.tstorm-warning{background:var(--orange);}
.alert-box.tornado-watch{background:var(--red);}
.alert-box.tornado-warning{background:var(--purple);}
.alert-box.tornado-emergency{
  background:linear-gradient(135deg,var(--red),var(--purple));
  animation:pulseEmergency 1s infinite;
}

.alert-title{
  font-weight:900;
  font-size:17px;
  margin-bottom:6px;
}

.alert-meta{
  font-size:13px;
  opacity:.92;
  margin-bottom:8px;
  line-height:1.35;
}

.station-hit{
  margin-top:8px;
  font-size:13px;
  line-height:1.45;
}

.station-hit-title{
  font-weight:900;
  margin-bottom:4px;
}

.station-list-line{
  display:block;
  font-weight:700;
}

.station-marker{
  background:var(--blue);
  border:2px solid white;
  border-radius:50%;
  width:14px;
  height:14px;
  box-shadow:0 0 8px rgba(0,0,0,.6);
}

.station-marker.impacted{
  background:#fff;
  border-color:#ff0000;
  box-shadow:0 0 18px #ff0000;
}

.poi-marker{
  background:#111;
  border:2px solid #facc15;
  border-radius:50%;
  width:11px;
  height:11px;
  box-shadow:0 0 10px rgba(250,204,21,.75);
}

#detailOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.detail-card{
  width:min(760px,92vw);
  max-height:85vh;
  overflow-y:auto;
  background:#101010;
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.65);
}

.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}

.detail-title{
  font-size:24px;
  font-weight:900;
}

.close-btn{
  background:#fff;
  color:#111;
  border:0;
  border-radius:6px;
  padding:8px 10px;
  font-weight:900;
  cursor:pointer;
}

.detail-section{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid rgba(255,255,255,.15);
}

.detail-list{
  margin:8px 0 0 18px;
  padding:0;
  line-height:1.6;
}

.leaflet-container{
  font-family:Arial, Helvetica, sans-serif;
}

@keyframes pulseEmergency{
  0%{box-shadow:0 0 0 rgba(255,0,0,0);}
  50%{box-shadow:0 0 24px rgba(255,0,255,.85);}
  100%{box-shadow:0 0 0 rgba(255,0,0,0);}
}
  .bottom-bar{
  width:100%;
  background:#000;
  border-top:2px solid rgba(255,255,255,.15);

  padding:10px 16px;

  font-size:14px;
  font-weight:900;
  letter-spacing:.08em;

  color:#e5e7eb;

  display:flex;
  align-items:center;
}
  .bottom-bar{
  background:linear-gradient(90deg,#000,#111);
  border-top:2px solid #f47b26;
}
  .bottom-bar{
  width:100%;
  background:linear-gradient(90deg,#000,#111);
  border-top:2px solid #f47b26;
  padding:10px 16px;
  font-size:14px;
  font-weight:900;

  color:#e5e7eb;
  display:flex;
  align-items:center;
  gap:14px;
  box-sizing:border-box;
}

.bottom-label{
  color:#f47b26;
}
</style>
</head>

async function loadTempestConditions(){
  const el = document.getElementById("tempestStatus");

  if(!TEMPEST_STATION_ID || TEMPEST_STATION_ID === "YOUR_STATION_ID"){
    el.textContent = "Tempest not configured";
    return;
  }

  try{
    const url = `https://swd.weatherflow.com/swd/rest/observations/station/${TEMPEST_STATION_ID}?token=${TEMPEST_TOKEN}`;
    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Tempest API failed: " + res.status);
    }

    const data = await res.json();

    const obs = data.obs && data.obs[0];

    if(!obs){
      throw new Error("No Tempest observation returned");
    }

    const airTempF = cToF(obs.air_temperature);
    const windMph = msToMph(obs.wind_avg);
    const gustMph = msToMph(obs.wind_gust);
    const rainIn = mmToIn(obs.precip_accum_local_day);
    const lightningDistance = obs.lightning_strike_last_distance;
    const lightningTime = obs.lightning_strike_last_epoch;

    const lightningText = lightningTime
      ? `${lightningDistance} mi`
      : "None recent";

    el.textContent =
      `TEMP ${airTempF}°F  /  RAIN ${rainIn}"  /  WIND ${windMph}G${gustMph} MPH  /  LIGHTNING ${lightningText}`;

  }catch(err){
    console.error("Tempest error:", err);
    el.textContent = "Tempest unavailable";
  }
}

function cToF(c){
  if(c === null || c === undefined) return "--";
  return Math.round((c * 9 / 5) + 32);
}

function msToMph(ms){
  if(ms === null || ms === undefined) return "--";
  return Math.round(ms * 2.23694);
}

function mmToIn(mm){
  if(mm === null || mm === undefined) return "--";
  return (mm / 25.4).toFixed(2);
}
async function loadAlerts(){
  const container = document.getElementById("alerts");
  container.innerHTML = "";
  warningLayer.clearLayers();
  latestPanelAlerts = [];

  resetZones();
  resetStationMarkers();

  try{
    const res = await fetch("https://api.weather.gov/alerts/active", {
      headers:{ "Accept":"application/geo+json" }
    });

    if(!res.ok){
      throw new Error("NWS API failed: " + res.status);
    }

    const data = await res.json();

    document.getElementById("infoTime").textContent = formatTime24(new Date().toISOString());

    const allArkansasAlerts = data.features
      .filter(isArkansasRelevantAlert)
      .sort(sortAlerts);

    const panelAlerts = allArkansasAlerts
      .filter(isNwsLittleRockAlert)
      .sort(sortAlerts);

    latestPanelAlerts = panelAlerts;

    allArkansasAlerts.forEach(alert => {
      if(shouldDrawPolygon(alert)){
        warningLayer.addData(alert);
      }

      const detail = buildAlertDetail(alert);
      applyZoneStatus(detail.affectedStations, detail.affectedTowns, getSeverity(alert.properties));
      highlightImpactedStations(detail.affectedStations);
    });

    if(!panelAlerts.length){
      container.innerHTML = `
        <div class="alert-box normal">
          <div class="alert-title">No LZK Watches or Warnings</div>
          <div class="alert-meta">No active tracked watches or warnings issued by NWS Little Rock.</div>
        </div>
      `;
    }

    panelAlerts.forEach(alert => {
      const p = alert.properties;
      const severity = getSeverity(p);
      const detail = buildAlertDetail(alert);

      container.insertAdjacentHTML("beforeend", `
        <div class="alert-box ${severity}" onclick='openDetailById("${alert.id}")'>
          <div class="alert-title">${formatTitle(p)}</div>
          <div class="alert-meta">
            <strong>Issued by:</strong> ${p.senderName || "NWS Little Rock"}<br>
            <strong>Expires:</strong> ${formatTime24(p.expires)}<br>
            <strong>Areas:</strong> ${formatAreas(p.areaDesc)}
          </div>
          <div class="station-hit">
            <div class="station-hit-title">Affected Stations</div>
            ${formatAffectedStations(detail.affectedStations)}
          </div>
        </div>
      `);
    });

    maintainMapViewAfterRefresh();

  }catch(err){
    console.error(err);
    container.innerHTML = `
      <div class="alert-box tornado-warning">
        <div class="alert-title">Unable to load alerts</div>
        <div class="alert-meta">${err.message}</div>
      </div>
    `;
  }
}

function maintainMapViewAfterRefresh(){
  const userRecentlyActive = Date.now() - lastUserMapActivity < USER_ACTIVITY_HOLD_MS;

  if(userRecentlyActive){
    return;
  }

  map.setView(AR_CENTER, AR_ZOOM, { animate:false });
}

function isArkansasRelevantAlert(alert){
  const p = alert.properties;
  const event = p.event || "";
  const ugc = p.geocode?.UGC || [];
  const area = p.areaDesc || "";

  const isAR =
    ugc.some(code => code.startsWith("AR")) ||
    area.includes(", AR") ||
    area.includes(" AR;") ||
    area.endsWith(" AR");

  const tracked =
    event === "Tornado Watch" ||
    event === "Severe Thunderstorm Watch" ||
    event === "Severe Thunderstorm Warning" ||
    event === "Tornado Warning";

  return isAR && tracked;
}

function isNwsLittleRockAlert(alert){
  const p = alert.properties;
  const senderName = (p.senderName || "").toUpperCase();
  const sender = (p.sender || "").toUpperCase();
  const params = p.parameters || {};

  const awips = Array.isArray(params.AWIPSidentifier)
    ? params.AWIPSidentifier.join(" ").toUpperCase()
    : "";

  const wmo = Array.isArray(params.WMOidentifier)
    ? params.WMOidentifier.join(" ").toUpperCase()
    : "";

  const nwsHeadline = Array.isArray(params.NWSheadline)
    ? params.NWSheadline.join(" ").toUpperCase()
    : "";

  return (
    senderName.includes("LITTLE ROCK") ||
    senderName.includes("NWS LITTLE ROCK") ||
    sender.includes("LZK") ||
    awips.includes("LZK") ||
    wmo.includes("KLZK") ||
    nwsHeadline.includes("LITTLE ROCK")
  );
}

function shouldDrawPolygon(alert){
  const event = alert.properties.event || "";
  const severity = getSeverity(alert.properties);

  return (
    alert.geometry &&
    (
      event === "Tornado Warning" ||
      event === "Severe Thunderstorm Warning" ||
      severity === "tornado-emergency"
    )
  );
}

function getSeverity(p){
  const event = p.event || "";
  const text = `${p.headline || ""} ${p.description || ""} ${p.instruction || ""}`.toUpperCase();

  if(event === "Tornado Warning" && text.includes("TORNADO EMERGENCY")){
    return "tornado-emergency";
  }

  if(event === "Tornado Warning") return "tornado-warning";
  if(event === "Tornado Watch") return "tornado-watch";
  if(event === "Severe Thunderstorm Warning") return "tstorm-warning";
  if(event === "Severe Thunderstorm Watch") return "tstorm-watch";

  return "normal";
}

function formatTitle(p){
  const severity = getSeverity(p);
  const number = getAlertNumber(p);

  if(severity === "tornado-emergency"){
    return number ? `Tornado Emergency #${number}` : "Tornado Emergency";
  }

  return number ? `${p.event} #${number}` : (p.event || "Weather Alert");
}

function getAlertNumber(p){
  const params = p.parameters || {};
  const vtecList = Array.isArray(params.VTEC) ? params.VTEC : [];

  for(const vtec of vtecList){
    const parts = String(vtec).split(".");
    const raw = parts[6];

    if(raw && /^\d+$/.test(raw)){
      return String(Number(raw));
    }
  }

  const headline = p.headline || "";
  const match = headline.match(/(?:watch|warning)\s+(\d+)/i);
  if(match) return match[1];

  return "";
}

function buildAlertDetail(alert){
  const p = alert.properties;
  const motion = parseStormMotion(p);
  const affectedStations = [];
  const affectedTowns = [];
  const affectedPOI = [];

  if(alert.geometry){
    stations.forEach(station => {
      const pt = turf.point([station.lng, station.lat]);
      if(turf.booleanPointInPolygon(pt, alert)){
        affectedStations.push(station);
      }
    });

    towns.forEach(town => {
      const pt = turf.point([town.lng, town.lat]);
      if(turf.booleanPointInPolygon(pt, alert)){
        affectedTowns.push(town);
      }
    });

    areasOfInterest.forEach(poi => {
      const pt = turf.point([poi.lng, poi.lat]);
      if(turf.booleanPointInPolygon(pt, alert)){
        affectedPOI.push(poi);
      }
    });
  }else{
    const area = p.areaDesc || "";

    stations.forEach(station => {
      if(areaLooksRelevantToStation(area, station)){
        affectedStations.push(station);
      }
    });

    towns.forEach(town => {
      if(areaLooksRelevantToTown(area, town)){
        affectedTowns.push(town);
      }
    });

    areasOfInterest.forEach(poi => {
      if(areaLooksRelevantToPOI(area, poi)){
        affectedPOI.push(poi);
      }
    });
  }

  const stationsWithTimes = affectedStations.map(station => ({
    ...station,
    impact: estimateImpactTime(alert, station, motion)
  }));

  const townsWithTimes = affectedTowns.map(town => ({
    ...town,
    impact: estimateImpactTime(alert, town, motion)
  }));

  const poiWithTimes = affectedPOI.map(poi => ({
    ...poi,
    impact: estimateImpactTime(alert, poi, motion)
  }));

  return {
    id:alert.id,
    title:formatTitle(p),
    event:p.event || "",
    severity:getSeverity(p),
    expires:p.expires,
    areaDesc:p.areaDesc || "",
    motion,
    affectedStations:stationsWithTimes,
    affectedTowns:townsWithTimes,
    affectedPOI:poiWithTimes,
    description:p.description || "",
    instruction:p.instruction || ""
  };
}

function formatAffectedStations(stationsHit){
  if(!stationsHit.length){
    return `<span class="station-list-line">No MEMS stations currently inside this alert area.</span>`;
  }

  return stationsHit
    .map(s => `<span class="station-list-line">${s.name} — ${s.impact}</span>`)
    .join("");
}

function areaLooksRelevantToStation(area, station){
  const a = area.toLowerCase();
  return station.zone.some(z => {
    if(z === "little-rock") return a.includes("pulaski");
    if(z === "nlr") return a.includes("pulaski");
    if(z === "maumelle") return a.includes("pulaski");
    if(z === "sherwood") return a.includes("pulaski");
    if(z === "cabot") return a.includes("lonoke");
    if(z === "lonoke") return a.includes("lonoke");
    if(z === "sheridan") return a.includes("grant");
    if(z === "grant") return a.includes("grant");
    return false;
  });
}

function areaLooksRelevantToTown(area, town){
  const a = area.toLowerCase();
  return town.zone.some(z => {
    if(z === "little-rock") return a.includes("pulaski");
    if(z === "nlr") return a.includes("pulaski");
    if(z === "maumelle") return a.includes("pulaski");
    if(z === "sherwood") return a.includes("pulaski");
    if(z === "cabot") return a.includes("lonoke");
    if(z === "lonoke") return a.includes("lonoke");
    if(z === "sheridan") return a.includes("grant");
    if(z === "grant") return a.includes("grant");
    return false;
  });
}

function areaLooksRelevantToPOI(area, poi){
  const a = area.toLowerCase();
  const p = `${poi.name} ${poi.area}`.toLowerCase();

  if(p.includes("cabot")) return a.includes("lonoke");
  if(p.includes("lonoke")) return a.includes("lonoke");
  if(p.includes("sheridan") || p.includes("grant")) return a.includes("grant");
  if(p.includes("benton") || p.includes("saline")) return a.includes("saline");
  if(p.includes("conway")) return a.includes("faulkner");
  if(p.includes("searcy")) return a.includes("white");
  if(p.includes("malvern")) return a.includes("hot spring");
  if(p.includes("pine bluff")) return a.includes("jefferson");

  return a.includes("pulaski");
}

function parseStormMotion(p){
  const text = `${p.description || ""} ${p.instruction || ""}`;
  const match = text.match(/moving\s+([A-Z]+)\s+at\s+(\d+)\s+mph/i);

  if(!match) return null;

  return {
    direction:match[1].toUpperCase(),
    speed:Number(match[2])
  };
}

function estimateImpactTime(alert, point, motion){
  if(!alert.geometry || !motion || !motion.speed){
    return "Timing not available";
  }

  try{
    const centroid = turf.centroid(alert);
    const target = turf.point([point.lng, point.lat]);
    const miles = turf.distance(centroid, target, { units:"miles" });
    const minutes = Math.round((miles / motion.speed) * 60);

    if(minutes <= 0) return "Now";
    if(minutes > 180) return "3+ hr";

    const impact = new Date(Date.now() + minutes * 60000);
    return `~${minutes} min / ${formatTime24(impact.toISOString())}`;
  }catch(e){
    return "Timing not available";
  }
}

function applyZoneStatus(stationsHit, townsHit, severity){
  const affectedZones = new Set();

  stationsHit.forEach(s => s.zone.forEach(z => affectedZones.add(z)));
  townsHit.forEach(t => t.zone.forEach(z => affectedZones.add(z)));

  affectedZones.forEach(zoneName => {
    const el = document.querySelector(`[data-zone="${zoneName}"]`);
    if(!el) return;
    setZoneSeverity(el, severity);
  });
}

function setZoneSeverity(el, severity){
  const rank = {
    "normal":0,
    "tstorm-watch":1,
    "tstorm-warning":2,
    "tornado-watch":3,
    "tornado-warning":4,
    "tornado-emergency":5
  };

  const current = Array.from(el.classList).find(c => rank[c] !== undefined) || "normal";

  if(rank[severity] >= rank[current]){
    el.className = `zone ${severity}`;
  }
}

function highlightImpactedStations(stationsHit){
  stationsHit.forEach(station => {
    const markerEl = document.getElementById(`marker-${slug(station.name)}`);
    if(markerEl) markerEl.classList.add("impacted");
  });
}

function resetStationMarkers(){
  document.querySelectorAll(".station-marker").forEach(el => el.classList.remove("impacted"));
}

function resetZones(){
  document.querySelectorAll(".zone").forEach(zone => {
    zone.className = "zone normal";
  });
}

function openDetailById(id){
  const alert = latestPanelAlerts.find(a => a.id === id);
  if(!alert) return;
  openDetail(buildAlertDetail(alert));
}

function openDetail(detail){
  document.getElementById("detailTitle").textContent = detail.title;

  document.getElementById("detailMeta").innerHTML = `
    <strong>Expires:</strong> ${formatTime24(detail.expires)}<br>
    <strong>Motion:</strong> ${detail.motion ? `${detail.motion.direction} at ${detail.motion.speed} mph` : "Not available"}<br>
    <strong>Areas:</strong> ${formatAreas(detail.areaDesc)}
  `;

  const stationItems = detail.affectedStations.length
    ? detail.affectedStations.map(s => `<li>${s.name} — <strong>${s.impact}</strong></li>`).join("")
    : "<li>No MEMS stations currently inside this alert area.</li>";

  const townItems = detail.affectedTowns.length
    ? detail.affectedTowns.map(t => `<li>${t.name} — <strong>${t.impact}</strong></li>`).join("")
    : "<li>No tracked towns currently inside this alert area.</li>";

  const poiItems = detail.affectedPOI.length
  ? detail.affectedPOI.map(p => `<li>${p.name} — <strong>${p.impact}</strong></li>`).join("")
  : "<li>No areas of interest currently inside this alert area.</li>";

  document.getElementById("detailBody").innerHTML = `
    <div class="detail-section">
      <strong>Affected Stations</strong>
      <ul class="detail-list">${stationItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Affected Towns</strong>
      <ul class="detail-list">${townItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Areas of Interest</strong>
      <ul class="detail-list">${poiItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Instruction</strong>
      <div>${detail.instruction || "No instruction included."}</div>
    </div>
  `;

  document.getElementById("detailOverlay").style.display = "flex";
}

function closeDetail(){
  document.getElementById("detailOverlay").style.display = "none";
}

function formatAreas(areaDesc){
  if(!areaDesc) return "None listed";
  const areas = areaDesc.split(";").map(a => a.trim()).filter(Boolean);
  if(areas.length <= 8) return areas.join(", ");
  return areas.slice(0,8).join(", ") + `, +${areas.length - 8} more`;
}

function formatTime24(value){
  if(!value) return "N/A";
  return new Date(value).toLocaleTimeString("en-US", {
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  });
}

function sortAlerts(a,b){
  const rank = {
    "tornado-emergency":5,
    "tornado-warning":4,
    "tornado-watch":3,
    "tstorm-warning":2,
    "tstorm-watch":1,
    "normal":0
  };

  return rank[getSeverity(b.properties)] - rank[getSeverity(a.properties)];
}

function slug(value){
  return String(value).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

function updateRefreshCountdown(){
  secondsUntilRefresh--;

  if(secondsUntilRefresh <= 0){
    secondsUntilRefresh = REFRESH_SECONDS;
    loadAlerts();
  }

  document.getElementById("refreshCountdown").textContent = secondsUntilRefresh + "s";
}

loadAlerts();
setInterval(updateRefreshCountdown, 1000);
loadTempestConditions();
setInterval(loadTempestConditions, 60000);
</script>
