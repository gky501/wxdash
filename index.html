<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMS Weather Center</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>

:root{
  --green:#1f7a3a;
  --yellow:#facc15;
  --orange:#f97316;
  --red:#dc2626;
  --purple:#7e22ce;
  --dark:#080808;
  --panel:#101418;
  --border:rgba(255,255,255,.10);
  --muted:#cbd5e1;
  --blue:#005bea;
  --mems-orange:#f47b26;
}

*{box-sizing:border-box;}

html,body{
  height:100%;
  margin:0;
  background:radial-gradient(circle at top,#111827 0%, #05070b 55%, #030407 100%);
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
}

header{
  height:58px;
  background:rgba(2,6,12,.88);
  backdrop-filter: blur(6px);
  border-bottom:1px solid var(--border);
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-shrink:0;
}

.header-title{
  font-size:25px;
  font-weight:900;
  letter-spacing:2px;
}

.header-info{
  text-align:right;
  font-size:13px;
  line-height:1.35;
  color:#e5e7eb;
}

.top-bar{
  height:38px;
  display:flex;
  flex-shrink:0;
}

.zone{
  flex:1;
  text-align:center;
  font-weight:900;
  font-size:13px;
  color:white;
  border-right:1px solid rgba(255,255,255,.25);
  padding:0;
}

.zone.normal{background:var(--green);}
.zone.tstorm-watch{background:var(--yellow); color:#111;}
.zone.tstorm-warning{background:var(--orange);}
.zone.tornado-watch{background:var(--red);}
.zone.tornado-warning{background:var(--purple);}
.zone.tornado-emergency{
  background:linear-gradient(90deg,var(--red),var(--purple));
  animation:pulseEmergency 1s infinite;
}

.zone-btn{
  width:100%;
  height:100%;
  border:0;
  background:transparent;
  color:inherit;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}

.zone-btn:hover{
  background:rgba(255,255,255,.16);
}

.layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:70% 30%;
}

#map{
  height:100%;
  min-height:0;
  background:#111;
}

.panel{
  background:linear-gradient(180deg, rgba(17,24,39,.82), rgba(15,23,42,.7));
  border-left:1px solid var(--border);
  padding:14px;
  overflow-y:auto;
  min-height:0;
}

.alert-box{
  padding:13px;
  transition:transform .15s ease, box-shadow .2s ease;
  margin-bottom:12px;
  border-radius:8px;
  cursor:pointer;
  border-left:5px solid white;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
}

.alert-box.normal{background:linear-gradient(135deg,#166534,#14532d);}
.alert-box.tstorm-watch{background:#a16207;}
.alert-box.tstorm-warning{background:linear-gradient(135deg,#ea580c,#c2410c);}
.alert-box.tornado-watch{background:linear-gradient(135deg,#dc2626,#991b1b);}
.alert-box.tornado-warning{background:linear-gradient(135deg,#7e22ce,#581c87);}
.alert-box.tornado-emergency{
  background:linear-gradient(135deg,var(--red),var(--purple));
  animation:pulseEmergency 1s infinite;
}

.alert-box:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(0,0,0,.35);
}

.alert-title{
  font-weight:900;
  font-size:17px;
  margin-bottom:6px;
}

.alert-meta{
  font-size:13px;
  opacity:.92;
  margin-bottom:8px;
  line-height:1.35;
}

.station-hit{
  margin-top:8px;
  font-size:13px;
  line-height:1.45;
}

.station-hit-title{
  font-weight:900;
  margin-bottom:4px;
}

.station-list-line{
  display:block;
  font-weight:700;
}

.station-marker{
  background:var(--blue);
  border:2px solid white;
  border-radius:50%;
  width:14px;
  height:14px;
  box-shadow:0 0 8px rgba(0,0,0,.6);
}

.station-marker.impacted{
  background:#fff;
  border-color:#ff0000;
  box-shadow:0 0 18px #ff0000;
}

.poi-marker{
  background:rgba(251,191,36,.5);
  border:1px solid rgba(251,191,36,.6);
  border-radius:50%;
  width:7px;
  height:7px;
  opacity:.45;
  transition:all .2s ease;
}

.poi-marker.zoomed{
  width:12px;
  height:12px;
  opacity:.95;
  border-width:2px;
  box-shadow:0 0 12px rgba(250,204,21,.7);
}

.storm-track-line{
  filter:drop-shadow(0 0 7px rgba(255,255,255,.55));
}

.track-label{
  background:rgba(2,6,23,.92);
  color:#fff;
  border:1px solid rgba(255,255,255,.35);
  border-radius:6px;
  padding:3px 6px;
  font-size:11px;
  font-weight:900;
  white-space:nowrap;
  box-shadow:0 4px 12px rgba(0,0,0,.35);
}

.track-origin{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  border:3px solid #111;
  box-shadow:0 0 18px rgba(255,255,255,.95);
}

.major-track-label{
  background:rgba(2,6,23,.94);
  color:#fff;
  border:1px solid rgba(255,255,255,.45);
  border-left:5px solid #f97316;
  border-radius:7px;
  padding:4px 7px;
  font-size:11px;
  font-weight:900;
  line-height:1.15;
  white-space:nowrap;
  box-shadow:0 6px 16px rgba(0,0,0,.45);
}

.major-track-label .eta{
  color:#facc15;
  font-size:12px;
}

.major-impact-label{
  background:rgba(127,29,29,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.4);
  border-radius:999px;
  padding:3px 8px;
  font-size:10px;
  font-weight:900;
  white-space:nowrap;
  box-shadow:0 5px 14px rgba(0,0,0,.45);
}

.bottom-bar{
  height:104px;
  flex-shrink:0;
  display:grid;
  grid-template-columns:170px repeat(5, 1fr);
  gap:10px;
  padding:10px 12px;
  background:linear-gradient(90deg,#020617,#0f172a);
  border-top:3px solid var(--mems-orange);
}

.conditions-title,
.condition-card{
  border-radius:10px;
  background:rgba(15,23,42,.78);
  border:1px solid var(--border);
  box-shadow:0 4px 14px rgba(0,0,0,.3);
}

.conditions-title{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:10px;
  background:rgba(2,6,23,.92);
}

.conditions-title span:first-child{
  color:var(--mems-orange);
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
}

.conditions-title span:last-child{
  font-size:20px;
  font-weight:900;
  margin-top:4px;
}

.condition-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:10px 12px;
}

.condition-card .label{
  font-size:12px;
  font-weight:900;
  color:#aaa;
  letter-spacing:.08em;
  margin-bottom:5px;
}

.condition-card .value{
  font-size:25px;
  font-weight:900;
  line-height:1;
}

.condition-card .sub{
  font-size:12px;
  color:#ddd;
  margin-top:6px;
}

.condition-card.temp{border-left:5px solid #38bdf8;}
.condition-card.rain{border-left:5px solid #22c55e;}
.condition-card.wind{border-left:5px solid #f97316;}
.condition-card.lightning{border-left:5px solid #facc15;}
.condition-card.updated{border-left:5px solid #94a3b8;}

.condition-card.warn{
  background:linear-gradient(135deg,#7f1d1d,#111);
  border-color:#ef4444;
}

.condition-card.caution{
  background:linear-gradient(135deg,#78350f,#111);
  border-color:#f97316;
}

.condition-card.lightning-near{
  background:linear-gradient(135deg,#713f12,#111);
  border-color:#facc15;
  animation:pulseLightning 1.4s infinite;
}

#detailOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.detail-card{
  width:min(860px,92vw);
  max-height:88vh;
  overflow-y:auto;
  background:#101010;
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.65);
}

.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}

.detail-title{
  font-size:24px;
  font-weight:900;
}

.close-btn{
  background:#fff;
  color:#111;
  border:0;
  border-radius:6px;
  padding:8px 10px;
  font-weight:900;
  cursor:pointer;
}

.detail-section{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid rgba(255,255,255,.15);
}

.detail-list{
  margin:8px 0 0 18px;
  padding:0;
  line-height:1.6;
}

@keyframes pulseEmergency{
  0%{box-shadow:0 0 0 rgba(255,0,0,0);}
  50%{box-shadow:0 0 24px rgba(255,0,255,.85);}
  100%{box-shadow:0 0 0 rgba(255,0,0,0);}
}

@media (max-width: 1200px){
  .layout{grid-template-columns:64% 36%;}
  .bottom-bar{grid-template-columns:140px repeat(5,1fr);}
}

@media (max-width: 980px){
  body{overflow:auto;}
  .layout{grid-template-columns:1fr; grid-template-rows:58vh 42vh;}
  .panel{border-left:0; border-top:1px solid var(--border);}
  .bottom-bar{height:auto; grid-template-columns:repeat(2,1fr);}
  .conditions-title{grid-column:1 / -1;}
}

@keyframes pulseLightning{
  0%{box-shadow:0 0 0 rgba(250,204,21,0);}
  50%{box-shadow:0 0 18px rgba(250,204,21,.8);}
  100%{box-shadow:0 0 0 rgba(250,204,21,0);}
}


/* ===== Screenshot-style storm dashboard overrides ===== */
:root{--glass:rgba(3,8,13,.78);--glass-strong:rgba(3,8,13,.92);--line:rgba(255,255,255,.22);--hot:#f47b26;--blue2:#2563eb;}
html,body{background:#020406;font-family:Arial,Helvetica,sans-serif;}
body{height:100vh;display:grid;grid-template-rows:76px 1fr 132px;overflow:hidden;}
header{height:76px;padding:10px 18px;background:linear-gradient(180deg,#020406,#070b10);border-bottom:1px solid rgba(255,255,255,.20);display:grid;grid-template-columns:210px 1fr 185px;gap:16px;}
.header-title{display:flex;flex-direction:column;line-height:.9;letter-spacing:0;font-size:0}
.header-title::before{content:"MEMS";color:var(--hot);font-size:33px;font-weight:1000;font-style:italic;letter-spacing:.5px}
.header-title::after{content:"Weather Center";color:#fff;font-size:22px;font-weight:900;font-style:italic;margin-top:5px}
.header-info{font-size:13px;align-self:center}.header-info #infoTime{font-size:30px;display:block;margin-top:2px}
.top-bar{height:100%;gap:6px;align-items:center;padding:0}
.zone{height:56px;border-radius:4px;border:1px solid rgba(255,255,255,.14);box-shadow:0 6px 18px rgba(0,0,0,.28);overflow:hidden}
.zone-btn{display:flex;align-items:center;justify-content:center;flex-direction:column;text-shadow:0 1px 3px rgba(0,0,0,.35);font-size:12px;line-height:1.2}
.zone.normal{background:linear-gradient(180deg,#0a8a40,#05672d)}
.zone.tstorm-watch{background:linear-gradient(180deg,#facc15,#d8a800);color:#080808}
.zone.tstorm-warning{background:linear-gradient(180deg,#f97316,#c2410c)}
.zone.tornado-watch,.zone.tornado-warning{background:linear-gradient(180deg,#dc2626,#991b1b)}
.zone.tornado-emergency{background:linear-gradient(90deg,#dc2626,#7e22ce)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 380px;min-height:0;height:100%;border-bottom:1px solid rgba(255,255,255,.25)}
.map-wrap{position:relative;min-height:0;overflow:hidden;border-right:1px solid rgba(255,255,255,.25)}
#map{height:100%;width:100%;background:#081018}
.leaflet-control-layers{display:none!important}.leaflet-control-zoom a{background:#f8fafc!important;color:#111!important;font-weight:900}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#161616;color:#fff;border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 24px rgba(0,0,0,.55)}
.leaflet-popup-content{font-size:13px;line-height:1.35}
.map-controls{position:absolute;left:14px;top:104px;z-index:900;width:255px;background:linear-gradient(180deg,rgba(2,6,12,.92),rgba(2,8,14,.82));border:1px solid rgba(255,255,255,.24);border-radius:5px;box-shadow:0 18px 40px rgba(0,0,0,.5);overflow:hidden;backdrop-filter:blur(8px)}
.controls-title{font-size:13px;font-weight:900;padding:12px 13px 9px;border-bottom:1px solid rgba(255,255,255,.18);letter-spacing:.02em}
.controls-title.small{border-top:1px solid rgba(255,255,255,.16);border-bottom:0;padding-bottom:7px}
.control-row{height:38px;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.11);font-size:14px}
.toggle{appearance:none;width:38px;height:21px;border-radius:999px;background:#4b5563;position:relative;outline:none;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
.toggle:checked{background:#2563eb}.toggle::after{content:"";position:absolute;top:3px;left:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.15s ease}.toggle:checked::after{left:20px}
.legend-block{padding:9px 12px 12px;font-size:11px;color:#dbe4ee;border-bottom:1px solid rgba(255,255,255,.11)}
.dbz-bar{height:13px;margin:8px 0 4px;background:linear-gradient(90deg,#1e40af,#0ea5e9,#16a34a,#facc15,#f97316,#dc2626,#a21caf,#f9a8d4);border:1px solid rgba(255,255,255,.35)}
.dbz-scale{display:flex;justify-content:space-between;font-size:10px;color:#fff}
.track-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 12px}
.track-buttons button{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;border-radius:5px;font-size:11px;padding:8px 0;cursor:pointer}
.track-buttons button.active{background:#2563eb;border-color:#60a5fa}
.panel{padding:0;background:#061016;border-left:1px solid rgba(255,255,255,.22);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
#alerts{padding:14px;overflow-y:auto}
#alerts::before{content:"ACTIVE ALERTS";display:block;color:#d1d5db;font-size:16px;font-weight:900;margin:0 0 12px;letter-spacing:.03em}
.alert-box{border-radius:5px;border:1px solid rgba(255,255,255,.15);border-left:0;box-shadow:0 9px 22px rgba(0,0,0,.36);padding:15px 16px;margin-bottom:10px}
.alert-title{font-size:18px;text-transform:uppercase}.alert-meta{font-size:13px;color:#f8fafc}
.station-hit{border-top:1px solid rgba(255,255,255,.18);padding-top:8px;margin-top:10px}.station-hit-title{color:#facc15;text-transform:uppercase;font-size:12px}
.track-label,.major-track-label{background:transparent;border:0;box-shadow:none;color:#fff;text-shadow:0 2px 5px #000,0 0 3px #000;font-size:18px;font-weight:1000;padding:0}
.major-track-label .eta{color:#fff;font-size:18px}.track-origin{width:18px;height:18px;border:3px solid #fff;background:#111;box-shadow:0 0 0 2px #111,0 0 18px rgba(255,255,255,.9)}
.major-impact-label{background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.5);color:#fff;font-size:13px;text-shadow:0 2px 4px #000}
.bottom-bar{height:132px;display:grid;grid-template-columns:280px repeat(4,1fr) 360px;gap:0;padding:0;background:#061016;border-top:1px solid rgba(255,255,255,.26)}
.conditions-title,.condition-card{border-radius:0;border:0;border-right:1px solid rgba(255,255,255,.25);background:linear-gradient(180deg,rgba(7,16,22,.96),rgba(3,8,13,.96));box-shadow:none;padding:18px 22px}
.conditions-title span:first-child{font-size:18px;color:#facc15}.conditions-title span:last-child{font-size:14px;font-weight:700;color:#fff;margin-top:7px}
.condition-card .label{font-size:15px;color:#d1d5db}.condition-card .value{font-size:30px}.condition-card .sub{font-size:15px;color:#f3f4f6}
.condition-card.temp,.condition-card.rain,.condition-card.wind,.condition-card.lightning,.condition-card.updated{border-left:0}
.condition-card.temp .value::before{content:"☁️ ";font-size:32px}.condition-card.rain .value::before{content:"💧 "}.condition-card.wind .value::before{content:"≋ ";color:#f97316}.condition-card.lightning .value::before{content:"⚡ ";color:#facc15}
.condition-card.updated{display:none}
.bottom-bar::after{content:"MEMS STATIONS\A  ◉ Online   ◉ Impacted   ● POI\A VIEW STATION LIST";white-space:pre-line;display:flex;align-items:center;padding:18px 22px;color:#fff;font-weight:800;line-height:2;background:linear-gradient(180deg,rgba(7,16,22,.96),rgba(3,8,13,.96))}
#detailOverlay{background:rgba(0,0,0,.58)}.detail-card{background:#071016;border:1px solid rgba(255,255,255,.28);border-radius:6px;width:min(740px,92vw)}.detail-title{text-transform:uppercase}.detail-section{border-top:1px solid rgba(255,255,255,.16)}.close-btn{border-radius:4px}
@media(max-width:1200px){body{grid-template-rows:72px 1fr 112px}header{grid-template-columns:180px 1fr 145px}.layout{grid-template-columns:minmax(0,1fr) 330px}.map-controls{width:230px}.bottom-bar{grid-template-columns:220px repeat(4,1fr)}.bottom-bar::after{display:none}}
@media(max-width:900px){body{overflow:auto;display:block}header{height:auto;display:block}.top-bar{flex-wrap:wrap;height:auto;margin-top:10px}.zone{min-width:48%}.layout{display:block}.map-wrap{height:60vh}.panel{height:45vh}.map-controls{position:absolute;left:10px;top:80px;transform:scale(.92);transform-origin:top left}.bottom-bar{height:auto;grid-template-columns:1fr 1fr}.conditions-title{grid-column:1/-1}}

</style>

<body>
<header>
  <div class="header-title">MEMS WEATHER CENTER</div>
  <div class="header-info">
    <div>Information Time: <strong id="infoTime">--:--</strong></div>
    <div>Next Refresh: <strong id="refreshCountdown">60s</strong></div>
  </div>
</header>

<div class="top-bar">
  <div class="zone normal" data-zone="little-rock"><button class="zone-btn" onclick="openZoneDetail('little-rock')">LITTLE ROCK</button></div>
  <div class="zone normal" data-zone="nlr"><button class="zone-btn" onclick="openZoneDetail('nlr')">NLR</button></div>
  <div class="zone normal" data-zone="maumelle"><button class="zone-btn" onclick="openZoneDetail('maumelle')">MAUMELLE</button></div>
  <div class="zone normal" data-zone="sherwood"><button class="zone-btn" onclick="openZoneDetail('sherwood')">SHERWOOD</button></div>
  <div class="zone normal" data-zone="cabot"><button class="zone-btn" onclick="openZoneDetail('cabot')">CABOT</button></div>
  <div class="zone normal" data-zone="lonoke"><button class="zone-btn" onclick="openZoneDetail('lonoke')">LONOKE CO</button></div>
  <div class="zone normal" data-zone="sheridan"><button class="zone-btn" onclick="openZoneDetail('sheridan')">SHERIDAN</button></div>
  <div class="zone normal" data-zone="arch-st"><button class="zone-btn" onclick="openZoneDetail('arch-st')">ARCH ST</button></div>
</div>

<div class="layout">
  <main class="map-wrap">
    <div id="map"></div>

    <section class="map-controls" aria-label="Map controls">
      <div class="controls-title">MAP CONTROLS</div>

      <label class="control-row">
        <span>Radar Reflectivity</span>
        <input type="checkbox" class="toggle" checked onchange="setLayerVisible('radar', this.checked)">
      </label>

      <div class="legend-block">
        <div>Legend: dBZ</div>
        <div class="dbz-bar"></div>
        <div class="dbz-scale"><span>10</span><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span><span>70</span><span>80</span></div>
      </div>

      <label class="control-row"><span>Storm Tracks</span><input type="checkbox" class="toggle" checked onchange="setLayerVisible('tracks', this.checked)"></label>
      <label class="control-row"><span>MEMS Stations</span><input type="checkbox" class="toggle" checked onchange="setLayerVisible('stations', this.checked)"></label>
      <label class="control-row"><span>Points of Interest</span><input type="checkbox" class="toggle" checked onchange="setLayerVisible('poi', this.checked)"></label>
      <label class="control-row"><span>Warning Polygons</span><input type="checkbox" class="toggle" checked onchange="setLayerVisible('warnings', this.checked)"></label>

      <div class="controls-title small">TRACK TIME STEPS</div>
      <div class="track-buttons">
        <button type="button" class="active">15 min</button>
        <button type="button">30 min</button>
        <button type="button">45 min</button>
        <button type="button">60 min</button>
      </div>
    </section>
  </main>
  <aside class="panel">
    <div id="alerts"></div>
  </div>
  </aside>
</div>

<div class="bottom-bar">
  <div class="conditions-title">
    <span>STATION 1</span>
    <span>LIVE WEATHER</span>
  </div>

  <div class="condition-card temp" id="tempCard">
    <div class="label">TEMP</div>
    <div class="value" id="tempValue">--°</div>
    <div class="sub" id="humidityValue">Humidity --%</div>
  </div>

async function loadTempestConditions(){
  if(!TEMPEST_STATION_ID || TEMPEST_TOKEN === "PASTE_YOUR_TOKEN_HERE"){
    setTempestUnavailable("Token not configured");
    return;
  }

  try{
    const url = `https://swd.weatherflow.com/swd/rest/observations/station/${TEMPEST_STATION_ID}?token=${TEMPEST_TOKEN}`;
    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Tempest API failed: " + res.status);
    }

    const data = await res.json();
    const obs = data.obs && data.obs[0];

    if(!obs){
      throw new Error("No Tempest observation returned");
    }

    const airTempF = cToF(obs.air_temperature);
    const humidity = safeRound(obs.relative_humidity);
    const windMph = msToMph(obs.wind_avg);
    const gustMph = msToMph(obs.wind_gust);
    const windDir = degToCompass(obs.wind_direction);
    const rainDay = mmToIn(obs.precip_accum_local_day);
    const rainRate = mmToIn(obs.precip);
    const lightningKm = obs.lightning_strike_last_distance;
    const lightningMiles = lightningKm ? Math.round(lightningKm * 0.621371) : null;
    const lightningTime = obs.lightning_strike_last_epoch;
    const obsEpoch = obs.timestamp || obs.epoch;
    const ageSec = obsEpoch ? Math.floor((Date.now() / 1000) - obsEpoch) : null;

    document.getElementById("tempValue").textContent = `${airTempF}°`;
    document.getElementById("humidityValue").textContent = `Humidity ${humidity}%`;

    document.getElementById("rainValue").textContent = `${rainDay}"`;
    document.getElementById("rainRateValue").textContent = `Rate ${rainRate}"/hr`;

    document.getElementById("windValue").textContent = `${windMph}G${gustMph}`;
    document.getElementById("windSubValue").textContent = `${windDir} / MPH`;

    if(lightningTime && lightningMiles !== null){
      document.getElementById("lightningValue").textContent = `${lightningMiles} MI`;
      document.getElementById("lightningSubValue").textContent = `Last strike distance`;
    }else{
      document.getElementById("lightningValue").textContent = "NONE";
      document.getElementById("lightningSubValue").textContent = "No recent strike";
    }

    document.getElementById("tempestUpdatedValue").textContent = obsEpoch ? formatTime24(new Date(obsEpoch * 1000).toISOString()) : "--:--";
    document.getElementById("tempestAgeValue").textContent = ageSec !== null ? `${ageSec}s ago` : "Age unavailable";

    updateConditionCardClasses(gustMph, lightningMiles, ageSec);

  }catch(err){
    console.error("Tempest error:", err);
    setTempestUnavailable(err.message);
  }
}

async function loadOutlookData(){
  const endpoints = {
    tornado:"https://www.spc.noaa.gov/products/outlook/day1probotlk_torn.lyr.geojson",
    hail:"https://www.spc.noaa.gov/products/outlook/day1probotlk_hail.lyr.geojson",
    wind:"https://www.spc.noaa.gov/products/outlook/day1probotlk_wind.lyr.geojson",
    excessiveRain:"https://mapservices.weather.noaa.gov/vector/rest/services/hazards/wpc_precip_hazards/MapServer/0/query?where=1%3D1&outFields=*&f=geojson"
  };

  for(const key in endpoints){
    try{
      const res = await fetch(endpoints[key]);
      if(!res.ok) throw new Error(key + " failed");
      outlookData[key] = await res.json();
    }catch(err){
      console.warn("Outlook load failed:", key, err);
      outlookData[key] = null;
    }
  }
}

async function loadAlerts(){
  const container = document.getElementById("alerts");
  container.innerHTML = "";
  warningLayer.clearLayers();
  stormTrackLayer.clearLayers();
  latestPanelAlerts = [];

  resetZones();
  resetStationMarkers();

  try{
    const res = await fetch("https://api.weather.gov/alerts/active", {
      headers:{ "Accept":"application/geo+json" }
    });

    if(!res.ok){
      throw new Error("NWS API failed: " + res.status);
    }

    const data = await res.json();

    document.getElementById("infoTime").textContent = formatTime24(new Date().toISOString());

    const allArkansasAlerts = data.features
      .filter(isArkansasRelevantAlert)
      .sort(sortAlerts);

    latestAllArkansasAlerts = allArkansasAlerts;

    const panelAlerts = allArkansasAlerts
      .filter(isNwsLittleRockAlert)
      .sort(sortAlerts);

    latestPanelAlerts = panelAlerts;

    allArkansasAlerts.forEach(alert => {
      if(shouldDrawPolygon(alert)){
        warningLayer.addData(alert);
        drawStormTrack(alert);
      }

      const detail = buildAlertDetail(alert);
      applyZoneStatus(detail.affectedStations, detail.affectedTowns, getSeverity(alert.properties));
      highlightImpactedStations(detail.affectedStations);
    });

    if(!panelAlerts.length){
      container.innerHTML = `
        <div class="alert-box normal">
          <div class="alert-title">No LZK Watches or Warnings</div>
          <div class="alert-meta">No active tracked watches or warnings issued by NWS Little Rock.</div>
        </div>
      `;
    }

    panelAlerts.forEach(alert => {
      const p = alert.properties;
      const severity = getSeverity(p);
      const detail = buildAlertDetail(alert);

      container.insertAdjacentHTML("beforeend", `
        <div class="alert-box ${severity}" onclick='openDetailById("${alert.id}")'>
          <div class="alert-title">${formatTitle(p)}</div>
          <div class="alert-meta">
            <strong>Issued by:</strong> ${p.senderName || "NWS Little Rock"}<br>
            <strong>Expires:</strong> ${formatTime24(p.expires)}<br>
            <strong>Areas:</strong> ${formatAreas(p.areaDesc)}
          </div>
          <div class="station-hit">
            <div class="station-hit-title">Affected Stations</div>
            ${formatAffectedStations(detail.affectedStations)}
          </div>
        </div>
      `);
    });

    maintainMapViewAfterRefresh();

  }catch(err){
    console.error(err);
    container.innerHTML = `
      <div class="alert-box tornado-warning">
        <div class="alert-title">Unable to load alerts</div>
        <div class="alert-meta">${err.message}</div>
      </div>
    `;
  }
}

function openZoneDetail(zoneId){
  const profile = zoneProfiles[zoneId];
  if(!profile) return;

  const zoneStations = stations.filter(s => profile.stations.includes(s.name));
  const zonePoint = turf.point([profile.center[1], profile.center[0]]);

  const activeAlerts = latestAllArkansasAlerts.filter(alert => {
    const detail = buildAlertDetail(alert);
    return detail.affectedStations.some(s => profile.stations.includes(s.name));
  });

  const alertItems = activeAlerts.length
    ? activeAlerts.map(alert => `
        <li>
          <strong>${formatTitle(alert.properties)}</strong>
          — Expires ${formatTime24(alert.properties.expires)}
        </li>
      `).join("")
    : "<li>No current watches or warnings for this station group.</li>";

  const stationItems = zoneStations.map(s => `<li>${s.name}</li>`).join("");
  const outlook = getOutlookForPoint(zonePoint);

  document.getElementById("detailTitle").textContent = profile.title;

  document.getElementById("detailMeta").innerHTML = `
    <strong>Station Radar View</strong><br>
    Local station group view centered on ${profile.title}
  `;

  document.getElementById("detailBody").innerHTML = `
    <div class="detail-section">
      <strong>Station Radar View</strong>
      <div id="stationRadarMap" style="height:280px;margin-top:10px;border-radius:10px;overflow:hidden;"></div>
    </div>

    <div class="detail-section">
      <strong>Outlook Data</strong>
      <ul class="detail-list">
        <li>Tornado — <strong>${outlook.tornado}</strong></li>
        <li>Hail — <strong>${outlook.hail}</strong></li>
        <li>Wind — <strong>${outlook.wind}</strong></li>
        <li>Excessive Rain — <strong>${outlook.excessiveRain}</strong></li>
      </ul>
    </div>

    <div class="detail-section">
      <strong>Stations</strong>
      <ul class="detail-list">${stationItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Current Watches and Warnings</strong>
      <ul class="detail-list">${alertItems}</ul>
    </div>
  `;

  document.getElementById("detailOverlay").style.display = "flex";

  setTimeout(() => {

function buildStationRadarMap(profile, zoneStations){
  const miniMap = L.map("stationRadarMap", {
    zoomControl:true,
    attributionControl:false
  }).setView(profile.center, 9);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    maxZoom:20
  }).addTo(miniMap);

  latestAllArkansasAlerts.forEach(alert => {
    if(shouldDrawPolygon(alert)){
      L.geoJSON(alert, {
        style:{
          color:getSeverity(alert.properties) === "tornado-warning" ? "#7e22ce" : "#f97316",
          weight:3,
          fillOpacity:.25
        }
      }).addTo(miniMap);
    }
  });

  zoneStations.forEach(s => {
    L.circleMarker([s.lat, s.lng], {
      radius:7,
      color:"#fff",
      weight:2,
      fillColor:"#005bea",
      fillOpacity:1
    }).bindPopup(`<strong>${s.name}</strong>`).addTo(miniMap);
  });
}

function getOutlookForPoint(point){
  return {
    tornado:getOutlookLabel(point, outlookData.tornado),
    hail:getOutlookLabel(point, outlookData.hail),
    wind:getOutlookLabel(point, outlookData.wind),
    excessiveRain:getOutlookLabel(point, outlookData.excessiveRain)
  };
}

function getOutlookLabel(point, geojson){
  if(!geojson || !geojson.features) return "Not loaded";

  let best = "None";

  geojson.features.forEach(feature => {
    if(!feature.geometry) return;

    try{
      if(turf.booleanPointInPolygon(point, feature)){
        best = readOutlookProperties(feature.properties);
      }
    }catch(e){}
  });

  return best;
}

function readOutlookProperties(props){
  return (
    props.LABEL ||
    props.label ||
    props.RISK ||
    props.risk ||
    props.CATEGORY ||
    props.category ||
    props.DN ||
    props.dn ||
    props.THRESHOLD ||
    props.threshold ||
    "Included"
  );
}

function maintainMapViewAfterRefresh(){
  const userRecentlyActive = Date.now() - lastUserMapActivity < USER_ACTIVITY_HOLD_MS;
  if(userRecentlyActive) return;
  map.setView(AR_CENTER, AR_ZOOM, { animate:false });
}

function isArkansasRelevantAlert(alert){
  const p = alert.properties;
  const event = p.event || "";
  const ugc = p.geocode?.UGC || [];
  const area = p.areaDesc || "";

  const isAR =
    ugc.some(code => code.startsWith("AR")) ||
    area.includes(", AR") ||
    area.includes(" AR;") ||
    area.endsWith(" AR");

  const tracked =
    event === "Tornado Watch" ||
    event === "Severe Thunderstorm Watch" ||
    event === "Severe Thunderstorm Warning" ||
    event === "Tornado Warning";

  return isAR && tracked;
}

function isNwsLittleRockAlert(alert){
  const p = alert.properties;
  const senderName = (p.senderName || "").toUpperCase();
  const sender = (p.sender || "").toUpperCase();
  const params = p.parameters || {};

  const awips = Array.isArray(params.AWIPSidentifier) ? params.AWIPSidentifier.join(" ").toUpperCase() : "";
  const wmo = Array.isArray(params.WMOidentifier) ? params.WMOidentifier.join(" ").toUpperCase() : "";
  const nwsHeadline = Array.isArray(params.NWSheadline) ? params.NWSheadline.join(" ").toUpperCase() : "";

  return (
    senderName.includes("LITTLE ROCK") ||
    senderName.includes("NWS LITTLE ROCK") ||
    sender.includes("LZK") ||
    awips.includes("LZK") ||
    wmo.includes("KLZK") ||
    nwsHeadline.includes("LITTLE ROCK")
  );
}

function shouldDrawPolygon(alert){
  const event = alert.properties.event || "";
  const severity = getSeverity(alert.properties);

  return alert.geometry && (
    event === "Tornado Warning" ||
    event === "Severe Thunderstorm Warning" ||
    severity === "tornado-emergency"
  );
}

function getSeverity(p){
  const event = p.event || "";
  const text = `${p.headline || ""} ${p.description || ""} ${p.instruction || ""}`.toUpperCase();

  if(event === "Tornado Warning" && text.includes("TORNADO EMERGENCY")) return "tornado-emergency";
  if(event === "Tornado Warning") return "tornado-warning";
  if(event === "Tornado Watch") return "tornado-watch";
  if(event === "Severe Thunderstorm Warning") return "tstorm-warning";
  if(event === "Severe Thunderstorm Watch") return "tstorm-watch";

  return "normal";
}

function formatTitle(p){
  const severity = getSeverity(p);
  const number = getAlertNumber(p);

  if(severity === "tornado-emergency") return number ? `Tornado Emergency #${number}` : "Tornado Emergency";
  return number ? `${p.event} #${number}` : (p.event || "Weather Alert");
}

function getAlertNumber(p){
  const params = p.parameters || {};
  const vtecList = Array.isArray(params.VTEC) ? params.VTEC : [];

  for(const vtec of vtecList){
    const parts = String(vtec).split(".");
    const raw = parts[6];
    if(raw && /^\d+$/.test(raw)) return String(Number(raw));
  }

  const headline = p.headline || "";
  const match = headline.match(/(?:watch|warning)\s+(\d+)/i);
  if(match) return match[1];

  return "";
}

function buildAlertDetail(alert){
  const p = alert.properties;
  const motion = parseStormMotion(p);
  const stormOrigin = parseStormOrigin(alert, p);
  const affectedStations = [];
  const affectedTowns = [];
  const affectedPOI = [];
  const bulletinAreas = extractImpactedAreasFromBulletin(p);
  const alertUgcCodes = getAlertUgcCodes(p);

  if(alert.geometry){
    stations.forEach(station => {
      if(pointInsideAlert(alert, station)) affectedStations.push(station);
    });

    locations.forEach(location => {
      if(pointInsideAlert(alert, location)) affectedPOI.push(location);
    });

    /*
      Popup "Areas Impacted" should come from the NWS bulletin language,
      not from the polygon overlay or map lookup. This keeps the popup
      aligned with what NWS actually wrote in the warning.
    */
    bulletinAreas.forEach(name => {
      const matchedTown = towns.find(t => normalizeName(t.name) === normalizeName(name));
      if(matchedTown){
        affectedTowns.push(matchedTown);
      }else{
        affectedTowns.push({ name, zone:[], impact:"Timing not available" });
      }
    });
  }else{
    /*
      Watches usually do not include polygons.
      Use NWS UGC county codes first, with a conservative areaDesc fallback.
      This prevents Pulaski/Lonoke watches from lighting up Sheridan/Grant.
    */
    stations.forEach(station => {
      if(itemMatchesAlertUgc(station, alertUgcCodes, p.areaDesc)) affectedStations.push(station);
    });

    towns.forEach(town => {
      if(itemMatchesAlertUgc(town, alertUgcCodes, p.areaDesc)) affectedTowns.push(town);
    });

    locations.forEach(location => {
      if(areaLooksRelevantToPOI(p.areaDesc || "", location)) affectedPOI.push(location);
    });
  }

  return {
    id:alert.id,
    title:formatTitle(p),
    event:p.event || "",
    severity:getSeverity(p),
    expires:p.expires,
    areaDesc:p.areaDesc || "",
    motion,
    stormOrigin,
    affectedStations:dedupeByName(affectedStations).map(s => ({...s, impact:estimateImpactTime(alert, s, motion, stormOrigin)})),
    affectedTowns:dedupeByName(affectedTowns).map(t => ({...t, impact:(t.lat !== undefined && t.lng !== undefined) ? estimateImpactTime(alert, t, motion, stormOrigin) : (t.impact || "Timing not available")})),
    affectedPOI:dedupeByName(affectedPOI).map(poi => ({...poi, impact:estimateImpactTime(alert, poi, motion, stormOrigin)})),
    impactedAreas:bulletinAreas,
    description:p.description || "",
    instruction:p.instruction || "",
    geometry:alert.geometry || null
  };
}

function formatAffectedStations(stationsHit){
  if(!stationsHit.length){
    return `<span class="station-list-line">No MEMS stations currently inside this alert area.</span>`;
  }

  return stationsHit
    .map(s => `<span class="station-list-line">${s.name} — ${s.impact}</span>`)
    .join("");
}

function getAlertUgcCodes(p){
  const ugc = p.geocode && Array.isArray(p.geocode.UGC) ? p.geocode.UGC : [];
  return ugc.map(code => String(code).toUpperCase());
}

function itemMatchesAlertUgc(item, alertUgcCodes, areaDesc){
  const itemCodes = Array.isArray(item.countyCodes) ? item.countyCodes.map(c => String(c).toUpperCase()) : [];

  if(alertUgcCodes.length && itemCodes.length){
    return itemCodes.some(code => alertUgcCodes.includes(code));
  }

  const area = String(areaDesc || "").toLowerCase();
  if(itemCodes.includes("ARC119")) return area.includes("pulaski");
  if(itemCodes.includes("ARC085")) return area.includes("lonoke");
  if(itemCodes.includes("ARC053")) return area.includes("grant");
  return false;
}

function pointInsideAlert(alert, point){
  try{
    return !!alert.geometry && turf.booleanPointInPolygon(turf.point([point.lng, point.lat]), alert);
  }catch(e){
    return false;
  }
}

function normalizeName(value){
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}

function dedupeByName(items){
  const seen = new Set();
  return items.filter(item => {
    const key = normalizeName(item.name);
    if(!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function extractImpactedAreasFromBulletin(p){
  const text = String(p.description || "").replace(/\r/g, "");
  const results = [];

  const patterns = [
    /Locations impacted include\.\.\.\s*([\s\S]*?)(?:\n\s*\n|PRECAUTIONARY\/PREPAREDNESS ACTIONS|HAZARD|SOURCE|IMPACT|This includes|&&|$)/i,
    /Other locations impacted by this severe thunderstorm include\.\.\.\s*([\s\S]*?)(?:\n\s*\n|PRECAUTIONARY\/PREPAREDNESS ACTIONS|HAZARD|SOURCE|IMPACT|This includes|&&|$)/i,
    /The tornado will be near\.\.\.\s*([\s\S]*?)(?:\n\s*\n|PRECAUTIONARY\/PREPAREDNESS ACTIONS|HAZARD|SOURCE|IMPACT|This includes|&&|$)/i
  ];

  patterns.forEach(pattern => {
    const match = text.match(pattern);
    if(match && match[1]){
      results.push(...splitBulletinPlaceList(match[1]));
    }
  });

  return [...new Set(results.map(cleanBulletinPlace).filter(Boolean))];
}

function splitBulletinPlaceList(block){
  return String(block || "")
    .replace(/\n/g, " ")
    .replace(/\s+/g, " ")
    .split(/,|;| and /i)
    .map(cleanBulletinPlace)
    .filter(Boolean);
}

function cleanBulletinPlace(value){
  return String(value || "")
    .replace(/\b(around|near|including|mainly|about|between|after|before)\b/ig, "")
    .replace(/\b\d{1,2}:\d{2}\s*(?:AM|PM)?\b/ig, "")
    .replace(/\b\d{1,2}\s*(?:AM|PM)\b/ig, "")
    .replace(/\b(by|at)\s*\d{1,2}\s*(?:AM|PM)?\b/ig, "")
    .replace(/\.$/, "")
    .replace(/\s+/g, " ")
    .trim();
}


function areaLooksRelevantToPOI(area, location){
  const a = area.toLowerCase();
  const p = `${location.name} ${location.area}`.toLowerCase();

  if(p.includes("cabot")) return a.includes("lonoke");
  if(p.includes("lonoke")) return a.includes("lonoke");
  if(p.includes("sheridan") || p.includes("grant")) return a.includes("grant");
  if(p.includes("benton") || p.includes("saline")) return a.includes("saline");
  if(p.includes("conway")) return a.includes("faulkner");
  if(p.includes("searcy")) return a.includes("white");
  if(p.includes("malvern")) return a.includes("hot spring");
  if(p.includes("pine bluff")) return a.includes("jefferson");

  return a.includes("pulaski");
}

function extractAreaNames(areaDesc){
  if(!areaDesc) return [];

  return [...new Set(
    areaDesc
      .split(";")
      .map(name => name.trim())
      .filter(Boolean)
  )];
}

function parseStormMotion(p){
  const text = `${p.description || ""} ${p.instruction || ""}`;
  const match = text.match(/moving\s+([A-Z]+)\s+at\s+(\d+)\s+mph/i);
  if(!match) return null;
  return { direction:match[1].toUpperCase(), speed:Number(match[2]) };
}


function parseStormOrigin(alert, p){
  const text = `${p.description || ""} ${p.instruction || ""}`;
  const match = text.match(/located\s+(?:near|over|around|approximately\s+near|\d+\s+miles?\s+[a-z]+\s+of)\s+([A-Z][A-Za-z .'-]+?)(?:,|\s+moving|\s+at\s+|\.)/i);

  if(match && match[1]){
    const placeName = cleanBulletinPlace(match[1]);
    const known = findKnownPlace(placeName);
    if(known) return { lat:known.lat, lng:known.lng, label:known.name, source:"bulletin" };
  }

  if(alert.geometry){
    try{
      const c = turf.centroid(alert);
      const coords = c.geometry.coordinates;
      return { lat:coords[1], lng:coords[0], label:"warning center", source:"polygon" };
    }catch(e){}
  }

  return null;
}

function findKnownPlace(name){
  const target = normalizeName(name);
  if(!target) return null;
  const knownPlaces = [...towns, ...stations, ...locations];
  let exact = knownPlaces.find(p => normalizeName(p.name) === target);
  if(exact) return exact;
  return knownPlaces.find(p => {
    const n = normalizeName(p.name);
    return n.includes(target) || target.includes(n);
  }) || null;
}

function directionToBearing(direction){
  const map = {
    N:0, NNE:22.5, NE:45, ENE:67.5,
    E:90, ESE:112.5, SE:135, SSE:157.5,
    S:180, SSW:202.5, SW:225, WSW:247.5,
    W:270, WNW:292.5, NW:315, NNW:337.5
  };
  return map[String(direction || "").toUpperCase()] ?? null;
}

function drawStormTrack(alert){
  const p = alert.properties || {};
  if(!shouldDrawMajorStormTrack(p)) return;

  const motion = parseStormMotion(p);
  const origin = parseStormOrigin(alert, p);
  if(!motion || !motion.speed || !origin) return;

  const bearing = directionToBearing(motion.direction);
  if(bearing === null) return;

  const severity = getSeverity(p);
  const color = severity === "tornado-emergency" ? "#ff00ff" : severity === "tornado-warning" ? "#a855f7" : "#f97316";
  const originPoint = turf.point([origin.lng, origin.lat]);
  const minutes = [0, 15, 30, 45, 60];
  const points = minutes.map(min => projectPointFromOrigin(originPoint, motion.speed, bearing, min));

  const majorReason = getMajorStormReason(p);

  L.polyline(points, {
    color,
    weight: severity === "tornado-emergency" ? 6 : 5,
    opacity:.98,
    dashArray:"12 8",
    className:"storm-track-line"
  }).bindPopup(`
    <strong>${formatTitle(p)}</strong><br>
    <strong>Major track:</strong> ${majorReason}<br>
    <strong>Motion:</strong> ${motion.direction} at ${motion.speed} mph<br>
    <strong>Origin:</strong> ${origin.label}<br>
    <strong>Track timing:</strong> ${buildTrackTimingText(originPoint, motion.speed, bearing)}
  `).addTo(stormTrackLayer);

  L.marker(points[0], {
    icon:L.divIcon({ className:"", html:`<div class="track-origin"></div>`, iconSize:[18,18], iconAnchor:[9,9] })
  }).bindPopup(`<strong>Storm location</strong><br>${origin.label}<br>${motion.direction} at ${motion.speed} mph`).addTo(stormTrackLayer);

  [15,30,45,60].forEach((min, idx) => {
    const eta = formatTime24(new Date(Date.now() + min * 60000).toISOString());
    L.marker(points[idx + 1], {
      interactive:false,
      icon:L.divIcon({
        className:"",
        html:`<div class="major-track-label"><div>+${min} MIN</div><div class="eta">${eta}</div></div>`,
        iconSize:[82,36],
        iconAnchor:[41,18]
      })
    }).addTo(stormTrackLayer);
  });

  addMajorImpactTimingLabels(alert, origin, motion, bearing);
}

function shouldDrawMajorStormTrack(p){
  const severity = getSeverity(p);
  if(severity === "tornado-emergency" || severity === "tornado-warning") return true;

  if(severity !== "tstorm-warning") return false;

  const text = `${p.headline || ""} ${p.description || ""} ${p.instruction || ""}`.toUpperCase();
  const params = p.parameters || {};
  const thunderstormDamageThreat = Array.isArray(params.thunderstormDamageThreat) ? params.thunderstormDamageThreat.join(" ").toUpperCase() : "";
  const maxWindGust = Array.isArray(params.maxWindGust) ? params.maxWindGust.join(" ").toUpperCase() : "";
  const maxHailSize = Array.isArray(params.maxHailSize) ? params.maxHailSize.join(" ").toUpperCase() : "";

  const windMatch = maxWindGust.match(/(\d+)/) || text.match(/(\d+)\s*MPH WIND/i);
  const hailMatch = maxHailSize.match(/([0-9.]+)/) || text.match(/([0-9.]+)\s*IN(?:CH)? HAIL/i);
  const wind = windMatch ? Number(windMatch[1]) : 0;
  const hail = hailMatch ? Number(hailMatch[1]) : 0;

  return (
    thunderstormDamageThreat.includes("DESTRUCTIVE") ||
    thunderstormDamageThreat.includes("CONSIDERABLE") ||
    text.includes("DESTRUCTIVE") ||
    text.includes("CONSIDERABLE") ||
    wind >= 70 ||
    hail >= 2.75
  );
}

function getMajorStormReason(p){
  const severity = getSeverity(p);
  if(severity === "tornado-emergency") return "Tornado Emergency";
  if(severity === "tornado-warning") return "Tornado Warning";

  const params = p.parameters || {};
  const threat = Array.isArray(params.thunderstormDamageThreat) ? params.thunderstormDamageThreat.join(" ") : "";
  const wind = Array.isArray(params.maxWindGust) ? params.maxWindGust.join(" ") : "";
  const hail = Array.isArray(params.maxHailSize) ? params.maxHailSize.join(" ") : "";

  const pieces = [];
  if(threat) pieces.push(`${threat} damage threat`);
  if(wind) pieces.push(`Wind ${wind}`);
  if(hail) pieces.push(`Hail ${hail}`);
  return pieces.length ? pieces.join(" / ") : "High-end Severe Thunderstorm Warning";
}

function projectPointFromOrigin(originPoint, speedMph, bearing, minutes){
  const miles = speedMph * (minutes / 60);
  const dest = turf.destination(originPoint, miles, bearing, { units:"miles" });
  return [dest.geometry.coordinates[1], dest.geometry.coordinates[0]];
}

function buildTrackTimingText(originPoint, speedMph, bearing){
  return [15,30,45,60].map(min => {
    return `+${min} min ${formatTime24(new Date(Date.now() + min * 60000).toISOString())}`;
  }).join(" | ");
}

function addMajorImpactTimingLabels(alert, origin, motion, bearing){
  const candidates = [...stations, ...towns, ...locations]
    .filter(item => item.lat !== undefined && item.lng !== undefined)
    .map(item => {
      const impact = calculateTrackImpactMinutes(origin, item, motion.speed, bearing);
      return { item, ...impact };
    })
    .filter(row => row.isForward && row.crossTrackMiles <= 8 && row.minutes >= -2 && row.minutes <= 75)
    .sort((a,b) => a.minutes - b.minutes)
    .slice(0, 12);

  candidates.forEach(row => {
    const eta = row.minutes <= 3 ? "NOW" : formatTime24(new Date(Date.now() + row.minutes * 60000).toISOString());
    const label = row.minutes <= 3 ? `${row.item.name} NOW` : `${row.item.name} ${eta}`;

    L.marker([row.item.lat, row.item.lng], {
      interactive:false,
      icon:L.divIcon({
        className:"",
        html:`<div class="major-impact-label">${label}</div>`,
        iconSize:[130,24],
        iconAnchor:[65,12]
      })
    }).addTo(stormTrackLayer);
  });
}

function calculateTrackImpactMinutes(origin, point, speedMph, bearing){
  const originPoint = turf.point([origin.lng, origin.lat]);
  const targetPoint = turf.point([point.lng, point.lat]);
  const distanceMiles = turf.distance(originPoint, targetPoint, { units:"miles" });
  const targetBearing = turf.bearing(originPoint, targetPoint);
  const diffDeg = Math.abs(((targetBearing - bearing + 540) % 360) - 180);
  const diffRad = diffDeg * Math.PI / 180;
  const alongTrackMiles = distanceMiles * Math.cos(diffRad);
  const crossTrackMiles = Math.abs(distanceMiles * Math.sin(diffRad));

  return {
    isForward: alongTrackMiles >= -1,
    crossTrackMiles,
    alongTrackMiles,
    minutes: Math.round((alongTrackMiles / speedMph) * 60)
  };
}

function pointForwardOfStorm(origin, point, bearing){
  const angle = turf.bearing(turf.point([origin.lng, origin.lat]), turf.point([point.lng, point.lat]));
  const diff = Math.abs(((angle - bearing + 540) % 360) - 180);
  return diff <= 80;
}

function estimateImpactTime(alert, point, motion, stormOrigin){
  if(!motion || !motion.speed) return "Timing not available";

  const bearing = directionToBearing(motion.direction);
  if(bearing === null) return "Timing not available";

  try{
    const origin = stormOrigin || parseStormOrigin(alert, alert.properties || {});
    if(!origin) return "Timing not available";

    const impact = calculateTrackImpactMinutes(origin, point, motion.speed, bearing);

    if(!impact.isForward){
      return "Behind storm / timing uncertain";
    }

    if(impact.crossTrackMiles > 12){
      return "Near alert area / timing uncertain";
    }

    const minutes = impact.minutes;

    if(minutes <= 3) return "Now";
    if(minutes > 120) return "2+ hr";

    return `~${minutes} min / ${formatTime24(new Date(Date.now() + minutes * 60000).toISOString())}`;
  }catch(e){
    return "Timing not available";
  }
}

function applyZoneStatus(stationsHit, townsHit, severity){
  const affectedZones = new Set();

  stationsHit.forEach(s => s.zone.forEach(z => affectedZones.add(z)));
  townsHit.forEach(t => t.zone.forEach(z => affectedZones.add(z)));

  affectedZones.forEach(zoneName => {
    const el = document.querySelector(`[data-zone="${zoneName}"]`);
    if(el) setZoneSeverity(el, severity);
  });
}

function setZoneSeverity(el, severity){
  const rank = {
    "normal":0,
    "tstorm-watch":1,
    "tstorm-warning":2,
    "tornado-watch":3,
    "tornado-warning":4,
    "tornado-emergency":5
  };

  const current = Array.from(el.classList).find(c => rank[c] !== undefined) || "normal";
  if(rank[severity] >= rank[current]) el.className = `zone ${severity}`;
}

function highlightImpactedStations(stationsHit){
  stationsHit.forEach(station => {
    const markerEl = document.getElementById(`marker-${slug(station.name)}`);
    if(markerEl) markerEl.classList.add("impacted");
  });
}

function resetStationMarkers(){
  document.querySelectorAll(".station-marker").forEach(el => el.classList.remove("impacted"));
}

function resetZones(){
  document.querySelectorAll(".zone").forEach(zone => {
    zone.className = "zone normal";
  });
}

function openDetailById(id){
  const alert = latestPanelAlerts.find(a => a.id === id);
  if(alert) openDetail(buildAlertDetail(alert));
}

function openDetail(detail){
  document.getElementById("detailTitle").textContent = detail.title;

  document.getElementById("detailMeta").innerHTML = `
    <strong>Expires:</strong> ${formatTime24(detail.expires)}<br>
    <strong>Motion:</strong> ${detail.motion ? `${detail.motion.direction} at ${detail.motion.speed} mph` : "Not available"}<br>
    <strong>Track Origin:</strong> ${detail.stormOrigin ? `${detail.stormOrigin.label} (${detail.stormOrigin.source})` : "Not available"}<br>
    <strong>Areas:</strong> ${formatAreas(detail.areaDesc)}
  `;

  const stationItems = formatCondensedAlphabetizedList(
    detail.affectedStations,
    s => `${s.name} <strong>(${s.impact})</strong>`,
    "No MEMS stations currently inside this alert area."
  );

  const townItems = formatCondensedAlphabetizedList(
    detail.affectedTowns,
    t => `${t.name} <strong>(${t.impact})</strong>`,
    "No impacted areas were listed in the NWS bulletin."
  );

  const locationItems = formatLocationsByType(detail.affectedPOI);

  document.getElementById("detailBody").innerHTML = `
    <div class="detail-section">
      <strong>Affected Stations</strong>
      <ul class="detail-list">${stationItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Areas Impacted</strong>
      <ul class="detail-list" id="affectedTownsList">${townItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Locations</strong>
      <ul class="detail-list">${locationItems}</ul>
    </div>

    <div class="detail-section">
      <strong>Instruction</strong>
      <div>${detail.instruction || "No instruction included."}</div>
    </div>
  `;

  document.getElementById("detailOverlay").style.display = "flex";
  // Areas Impacted is intentionally pulled from the NWS bulletin, not the polygon overlay.

}

async function hydrateAffectedTowns(detail){
  const listEl = document.getElementById("affectedTownsList");
  if(!listEl) return;
  if(!detail.geometry){
    return;
  }

  listEl.innerHTML = "<li>Loading impacted areas from NWS bulletin…</li>";

  try{
    const names = await fetchPlacesInPolygon(detail.geometry);
    if(!names.length){
      listEl.innerHTML = "<li>No towns/cities/townships found inside this alert polygon.</li>";
      return;
    }

    listEl.innerHTML = names
      .sort((a,b) => a.localeCompare(b))
      .map(name => `<li>${name}</li>`)
      .join("");
  }catch(err){
    console.warn("Unable to load polygon places", err);
    listEl.innerHTML = "<li>Unable to load dynamic towns for this polygon.</li>";
  }
}

async function fetchPlacesInPolygon(geometry){
  const rings = geometry.type === "Polygon" ? [geometry.coordinates[0]] : geometry.coordinates[0].map(poly => poly[0]).filter(Boolean);
  if(!rings.length) return [];

  const queries = rings.map(ring => {
    const samples = ring.filter((_, idx) => idx % 2 === 0).slice(0, 120);
    const poly = samples.map(coord => `${coord[1]} ${coord[0]}`).join(" ");
    return `nwr["place"~"city|town|village|hamlet|suburb|quarter|neighbourhood"](poly:"${poly}");`;
  }).join("\n");

  const overpassQuery = `[out:json][timeout:25];(\n${queries}\n);out tags;`;
  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=UTF-8"},
    body:overpassQuery
  });

  if(!res.ok) throw new Error("Overpass request failed: " + res.status);
  const data = await res.json();
  const names = (data.elements || [])
    .map(el => el.tags && (el.tags.name || el.tags["name:en"]))
    .filter(Boolean);

  return [...new Set(names)];
}



function formatCondensedAlphabetizedList(items, renderItem, emptyMessage){
  if(!items.length) return `<li>${emptyMessage}</li>`;

  return [...items]
    .sort((a,b) => a.name.localeCompare(b.name))
    .map(item => `<li>${renderItem(item)}</li>`)
    .join("");
}

function formatLocationsByType(locationsList){
  if(!locationsList.length) return "<li>No locations currently inside this alert area.</li>";

  const groups = {};
  locationsList.forEach(location => {
    const type = location.type || "Other";
    if(!groups[type]) groups[type] = [];
    groups[type].push(location);
  });

  return Object.keys(groups)
    .sort((a,b) => a.localeCompare(b))
    .map(type => {
      const sorted = groups[type].sort((a,b) => a.name.localeCompare(b.name));
      const entries = sorted.map(l => `${l.name} <strong>(${l.impact})</strong>`).join(", ");
      return `<li><strong>${type}:</strong> ${entries}</li>`;
    })
    .join("");
}

function closeDetail(){
  document.getElementById("detailOverlay").style.display = "none";
}

function formatAreas(areaDesc){
  if(!areaDesc) return "None listed";
  const areas = areaDesc.split(";").map(a => a.trim()).filter(Boolean);
  if(areas.length <= 8) return areas.join(", ");
  return areas.slice(0,8).join(", ") + `, +${areas.length - 8} more`;
}

function formatTime24(value){
  if(!value) return "N/A";
  return new Date(value).toLocaleTimeString("en-US", {
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  });
}

function sortAlerts(a,b){
  const rank = {
    "tornado-emergency":5,
    "tornado-warning":4,
    "tornado-watch":3,
    "tstorm-warning":2,
    "tstorm-watch":1,
    "normal":0
  };

  return rank[getSeverity(b.properties)] - rank[getSeverity(a.properties)];
}

function slug(value){
  return String(value).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

function cToF(c){
  if(c === null || c === undefined) return "--";
  return Math.round((c * 9 / 5) + 32);
}

function msToMph(ms){
  if(ms === null || ms === undefined) return "--";
  return Math.round(ms * 2.23694);
}

function mmToIn(mm){
  if(mm === null || mm === undefined) return "--";
  return (mm / 25.4).toFixed(2);
}

function safeRound(value){
  if(value === null || value === undefined) return "--";
  return Math.round(value);
}

function degToCompass(deg){
  if(deg === null || deg === undefined) return "--";
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}

function updateRefreshCountdown(){
  secondsUntilRefresh--;

  if(secondsUntilRefresh <= 0){
    secondsUntilRefresh = REFRESH_SECONDS;
    loadAlerts();
  }

  document.getElementById("refreshCountdown").textContent = secondsUntilRefresh + "s";
}

function updateConditionCardClasses(gustMph, lightningMiles, ageSec){
  const windCard = document.getElementById("windCard");
  const lightningCard = document.getElementById("lightningCard");
  const updatedCard = document.getElementById("updatedCard");

  windCard.className = "condition-card wind";
  lightningCard.className = "condition-card lightning";
  updatedCard.className = "condition-card updated";

  if(gustMph >= 50) windCard.classList.add("warn");
  else if(gustMph >= 35) windCard.classList.add("caution");

  if(lightningMiles !== null && lightningMiles <= 10) lightningCard.classList.add("lightning-near");
  else if(lightningMiles !== null && lightningMiles <= 20) lightningCard.classList.add("caution");

  if(ageSec !== null && ageSec > 180) updatedCard.classList.add("warn");
  else if(ageSec !== null && ageSec > 90) updatedCard.classList.add("caution");
}

function setTempestUnavailable(reason){
  document.getElementById("tempValue").textContent = "--°";
  document.getElementById("humidityValue").textContent = reason;
  document.getElementById("rainValue").textContent = "--";
  document.getElementById("rainRateValue").textContent = "Rate --";
  document.getElementById("windValue").textContent = "--G--";
  document.getElementById("windSubValue").textContent = "Direction --";
  document.getElementById("lightningValue").textContent = "--";
  document.getElementById("lightningSubValue").textContent = "Unavailable";
  document.getElementById("tempestUpdatedValue").textContent = "--:--";
  document.getElementById("tempestAgeValue").textContent = "Tempest unavailable";
}

loadAlerts();
loadTempestConditions();
loadOutlookData();

setInterval(loadOutlookData, 10 * 60 * 1000);
setInterval(updateRefreshCountdown, 1000);
setInterval(loadTempestConditions, 60000);

</script>
