<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEMS Weather Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  background: black;
  padding: 14px 20px;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 2px;
}

.top-bar {
  display: flex;
}

.zone {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-weight: 700;
}

.zone.normal { background: #2e7d32; }
.zone.watch { background: #f47b26; }
.zone.warning { background: #b42318; }

.layout {
  display: grid;
  grid-template-columns: 70% 30%;
  height: calc(100vh - 110px);
}

#map {
  height: 100%;
}

.panel {
  background: #111;
  padding: 16px;
  overflow-y: auto;
}

.alert-box {
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 6px;
}

.alert-box.watch { background: #c2410c; }
.alert-box.warning { background: #b42318; }

.alert-title {
  font-weight: 900;
  margin-bottom: 6px;
}

.station-hit {
  margin-top: 8px;
  font-weight: 700;
}
</style>
</head>

<body>

<header>MEMS WEATHER CENTER</header>

<div class="top-bar">
  <div class="zone normal">LITTLE ROCK</div>
  <div class="zone normal">NLR</div>
  <div class="zone normal">MAUMELLE</div>
  <div class="zone normal">SHERWOOD</div>
  <div class="zone normal">CABOT</div>
  <div class="zone normal">LONOKE CO</div>
  <div class="zone normal">SHERIDAN</div>
  <div class="zone normal">GRANT CO</div>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="panel"><div id="alerts"></div></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
const map = L.map("map").setView([34.75, -92.25], 7);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

const stations = [
  { name: "Cabot", lat: 34.97, lng: -92.01 },
  { name: "Sheridan", lat: 34.31, lng: -92.39 },
  { name: "Maumelle", lat: 34.85, lng: -92.40 },
  { name: "Sherwood", lat: 34.83, lng: -92.20 },
  { name: "Little Rock", lat: 34.74, lng: -92.28 }
];

const stationLayer = L.layerGroup().addTo(map);
const watchLayer = L.geoJSON(null, {style:{color:"#f47b26",fillOpacity:.2}}).addTo(map);
const warningLayer = L.geoJSON(null, {style:{color:"#ff0000",fillOpacity:.35}}).addTo(map);

stations.forEach(s=>{
  L.circleMarker([s.lat,s.lng],{radius:6,color:"#fff",fillColor:"#005bea",fillOpacity:1})
  .bindPopup(s.name).addTo(stationLayer);
});

async function loadAlerts(){
  const container=document.getElementById("alerts");
  container.innerHTML="";
  watchLayer.clearLayers();
  warningLayer.clearLayers();
  resetZones();

  try{
    const res=await fetch("https://api.weather.gov/alerts/active",{headers:{"Accept":"application/geo+json"}});
    const data=await res.json();

    const alerts=data.features.filter(a=>{
      const e=a.properties.event;
      return e==="Tornado Warning"||e==="Tornado Watch"||e==="Severe Thunderstorm Watch";
    });

    alerts.forEach(alert=>{
      const p=alert.properties;
      const event=p.event;

      if(event==="Tornado Warning" && alert.geometry){
        warningLayer.addData(alert);
      }

      const impacted=stations.filter(st=>{
        if(!alert.geometry) return false;
        const pt=turf.point([st.lng,st.lat]);
        return turf.booleanPointInPolygon(pt,alert);
      });

      updateZones(impacted,event);

      container.innerHTML+=`
        <div class="alert-box ${event.includes("Warning")?"warning":"watch"}">
          <div class="alert-title">${event}</div>
          <div>${p.areaDesc || ""}</div>
          <div class="station-hit">
            ${impacted.length?impacted.map(s=>s.name).join(", "):"No stations impacted"}
          </div>
        </div>
      `;
    });

  }catch(err){
    console.error(err);
    container.innerHTML="<div class='alert-box warning'>API failed</div>";
  }
}

function resetZones(){
  document.querySelectorAll(".zone").forEach(z=>{
    z.className="zone normal";
  });
}

function updateZones(stations,event){
  const zones=document.querySelectorAll(".zone");

  stations.forEach(s=>{
    let index=0;

    if(s.name==="Little Rock") index=0;
    if(s.name==="Sherwood") index=3;
    if(s.name==="Maumelle") index=2;
    if(s.name==="Cabot") index=4;
    if(s.name==="Sheridan") index=6;

    zones[index].classList.remove("normal");

    if(event==="Tornado Warning"){
      zones[index].classList.add("warning");
    }else{
      zones[index].classList.add("watch");
    }
  });
}

loadAlerts();
setInterval(loadAlerts,60000);
</script>

</body>
</html>
