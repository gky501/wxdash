<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MEMS Weather Center</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: black;
      padding: 14px 20px;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .top-bar {
      display: flex;
      background: #f47b26;
    }

    .zone {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-weight: 700;
      border-right: 1px solid rgba(255,255,255,0.3);
    }

    .zone.normal { background: #2e7d32; }
    .zone.watch { background: #f47b26; }
    .zone.warning { background: #b42318; }

    .layout {
      display: grid;
      grid-template-columns: 70% 30%;
      height: calc(100vh - 110px);
    }

    #map {
      height: 100%;
    }

    .panel {
      background: #111;
      padding: 16px;
      overflow-y: auto;
    }

    .alert-box {
      background: #b42318;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 6px;
    }

    .alert-title {
      font-weight: 900;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<header>MEMS WEATHER CENTER</header>

<div class="top-bar">
  <div class="zone normal">LITTLE ROCK</div>
  <div class="zone normal">NLR</div>
  <div class="zone normal">MAUMELLE</div>
  <div class="zone normal">SHERWOOD</div>
  <div class="zone normal">CABOT</div>
  <div class="zone normal">LONOKE CO</div>
  <div class="zone normal">SHERIDAN</div>
  <div class="zone normal">GRANT CO</div>
</div>

<div class="layout">
  <div id="map"></div>

  <div class="panel">
    <div id="alerts"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([34.75, -92.25], 7);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 20
}).addTo(map);

const alertLayer = L.geoJSON(null, {
  style: feature => {
    const event = feature.properties.event;

    if (event === "Tornado Warning") {
      return { color: "#ff0000", weight: 3, fillOpacity: 0.35 };
    }

    if (event === "Tornado Watch") {
      return { color: "#b42318", weight: 2, fillOpacity: 0.2 };
    }

    if (event === "Severe Thunderstorm Watch") {
      return { color: "#f47b26", weight: 2, fillOpacity: 0.2 };
    }

    return { color: "#999", weight: 1, fillOpacity: 0.1 };
  }
}).addTo(map);

async function loadAlerts() {
  const container = document.getElementById("alerts");

  container.innerHTML = "";
  alertLayer.clearLayers();

  try {
    const res = await fetch("https://api.weather.gov/alerts/active/area/AR");
    const data = await res.json();

    const targetAlerts = data.features.filter(alert => {
      const event = alert.properties.event;

      return (
        event === "Tornado Watch" ||
        event === "Severe Thunderstorm Watch" ||
        event === "Tornado Warning"
      );
    });

    if (!targetAlerts.length) {
      container.innerHTML = `
        <div class="alert-box">
          <div class="alert-title">No active severe alerts</div>
          <div>No Tornado Watches, Severe Thunderstorm Watches, or Tornado Warnings for Arkansas.</div>
        </div>
      `;
      return;
    }

    targetAlerts.forEach(alert => {
      const event = alert.properties.event;

      if (alert.geometry) {
        alertLayer.addData(alert);
      }

      container.innerHTML += `
        <div class="alert-box">
          <div class="alert-title">${event}</div>
          <div>${formatAreas(alert.properties.areaDesc)}</div>
        </div>
      `;
    });

    if (alertLayer.getLayers().length) {
      map.fitBounds(alertLayer.getBounds(), {
        padding: [25, 25]
      });
    }

  } catch (error) {
    console.error(error);

    container.innerHTML = `
      <div class="alert-box">
        <div class="alert-title">Unable to load alerts</div>
        <div>NWS alert data could not be loaded.</div>
      </div>
    `;
  }
}

function formatAreas(areaDesc) {
  if (!areaDesc) return "No area listed.";

  const areas = areaDesc
    .split(";")
    .map(area => area.trim())
    .filter(Boolean);

  if (areas.length <= 10) {
    return areas.join(", ");
  }

  return areas.slice(0, 10).join(", ") + `, +${areas.length - 10} more`;
}

loadAlerts();
setInterval(loadAlerts, 60000);
</script>
</body>
</html>
